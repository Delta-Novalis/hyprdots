background {
    monitor =
    path = screenshot
    color = rgba(20, 20, 30, 1.0)
    blur_passes = 3
}

label {
    monitor =
    text = Hi there, $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 35
    font_family = JetBrains Mono Nerd
    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 30%, 8%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.2)

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 15

    position = 0, -30
    halign = center
    valign = center
}